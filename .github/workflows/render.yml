name: Render Video

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID'
        required: true
      composition:
        description: 'Remotion composition ID'
        required: true
        default: 'AIGeneratedVideo'
      props:
        description: 'JSON string of props'
        required: true
        default: '{}'
      output_file_name:
        description: 'Output filename (e.g. task-123.mp4)'
        required: false
        default: 'output.mp4'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug LS
        run: ls -R

      - name: Install dependencies
        run: npm install --no-package-lock --no-save

      - name: Render video
        run: |
          npx remotion render \
            --props='${{ github.event.inputs.props }}' \
            ${{ github.event.inputs.composition }} \
            out/${{ github.event.inputs.output_file_name }}
        working-directory: packages/remotion
        env:
          INPUT_PROPS: ${{ github.event.inputs.props }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.task_id }}
          path: packages/remotion/out/${{ github.event.inputs.output_file_name }}
          retention-days: 7

      - name: Notify webhook (update task status)
        if: always()
        run: |
          STATUS="COMPLETED"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="FAILED"
          fi
          curl -X POST "${{ secrets.WEBHOOK_URL }}/api/webhook/render-complete" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"taskId\": \"${{ github.event.inputs.task_id }}\", \"status\": \"$STATUS\", \"runId\": \"${{ github.run_id }}\"}" || true
